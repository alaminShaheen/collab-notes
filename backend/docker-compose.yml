services:
  postgres:
    image: postgres:16
    container_name: collab-notes-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: collab_notes
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d collab_notes" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

